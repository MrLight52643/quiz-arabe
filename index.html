function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function $(id){return document.getElementById(id)}
function esc(s){return (s||'').toString().replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[\r\n]+/g,' ')}

function stripMarks(s){return (s||'').toString().replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g,'').replace(/ـ/g,'')}
function norm(s){
  s=stripMarks(s).toLowerCase().trim();
  try{s=s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')}catch(e){}
  return s.replace(/[إأٱآا]/g,'ا').replace(/ى/g,'ي').replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/ة/g,'ه').replace(/œ/g,'oe').replace(/[’']/g,'').replace(/[^0-9a-z\u0600-\u06FF]+/gi,'')
}
function puzzleText(s){return (s||'').toString().replace(/[^0-9A-Za-zÀ-ÿŒœ\u0600-\u06FF]/g,'')}
function puzzleTargetText(s){
  s=puzzleText(s);
  return isArabicText(s)?s:s.toLocaleLowerCase('fr-FR');
}
function randomFrom(str){return str.charAt(Math.floor(Math.random()*str.length))}
function extraPuzzleChars(target,count){
  var ar=isArabicText(target);
  var pool=ar?'ابتثجحخدذرزسشصضطظعغفقكلمنهويءأإآةى':'abcdefghijklmnopqrstuvwxyzàâéèêëîïôùûüçœ';
  var out=[];
  for(var i=0;i<count;i++){out.push(randomFrom(pool))}
  return out;
}
function splitPuzzleChars(s){
  var out=[],cur='',marks=/[\u064B-\u065F\u0670\u06D6-\u06ED]/;
  Array.from(s||'').forEach(function(ch){
    if(marks.test(ch)){if(cur)cur+=ch;else cur=ch}
    else{if(cur)out.push(cur);cur=ch}
  });
  if(cur)out.push(cur);
  return out;
}
function isArabicText(s){return /[\u0600-\u06FF]/.test(s||'')}

function getWrongs(pool,correct,key,count){
  var filtered=pool.filter(function(w){return w[key]!==correct[key]});
  return shuffle(filtered).slice(0,count).map(function(w){return w[key]});
}

function buildQ(pool,qMode,size,nc){
  var cap=(size==='all')?pool.length:Math.min(size,pool.length);
  var picked=shuffle(pool).slice(0,cap);
  return picked.map(function(word){
    var dir=qMode==='mixed'?(Math.random()>.5?'a2f':'f2a'):qMode;
    var q=dir==='a2f'?word.a:word.f;
    var ans=dir==='a2f'?word.f:word.a;
    var key=dir==='a2f'?'f':'a';
    var src=pool.length>=nc?pool:ALL;
    var wrongs=getWrongs(src,word,key,nc-1);
    return{question:q,answer:ans,opts:shuffle([ans].concat(wrongs)),dir:dir,word:word};
  });
}

function primaryPlural(p){return (p||'').split('/')[0].trim()}
function pluralOfArabic(a){var hit=BROKEN_PLURALS[a]||(BROKEN_PLURALS_N[norm(a)]&&BROKEN_PLURALS_N[norm(a)].p);return hit||''}
function verbInfo(a){
  if(VERB_FORMS[a])return {a:a,v:VERB_FORMS[a]};
  return VERB_FORMS_N[norm(a)]||null;
}
function displayVerb(a,v){
  return '<span class="verbpair" dir="rtl"><span>'+htm(a)+'</span><span class="verbsep">/</span><span>'+htm(v)+'</span></span>';
}
function displayArabic(a,p){
  p=p||pluralOfArabic(a);
  if(p)return '<span class="plpair" dir="rtl"><span>'+htm(a)+'</span><span class="plsep">ج</span><span>'+htm(p)+'</span></span>';
  return htm(a);
}
function displayArabicWord(w){
  if(w&&w.v)return displayVerb(w.a,w.v);
  if(w)return displayArabic(w.a,w.p);
  return '';
}
function hasPlural(w){return !!(w&&(w.p||pluralOfArabic(w.a)))}
function hasVerb(w){return !!(w&&(w.v||verbInfo(w.a)))}
function wordForArabic(s){
  if(!isArabicText(s))return null;
  var n=norm(s);
  for(var i=0;i<ALL.length;i++){
    var w=ALL[i];
    if(norm(w.a)===n)return w;
    if(w.p){var ps=w.p.split('/');for(var p=0;p<ps.length;p++){if(norm(ps[p].trim())===n)return w}}
    if(w.v&&norm(w.v)===n)return w;
  }
  return null;
}
function chapterBadges(pool){
  var p=pool.some(function(w){return hasPlural(w)});
  var v=pool.some(function(w){return hasVerb(w)});
  var h='';
  if(p)h+='<span class="mini-badge plural" title="Pluriels cassés">ج</span>';
  if(v)h+='<span class="mini-badge verb" title="Verbes الماضي/المضارع">فعل</span>';
  return h?'<span class="tagrow">'+h+'</span>':'';
}
function displayMaybePlural(s,w){
  if(!isArabicText(s))return htm(s);
  if(w&&w.v){
    var vpairs=[w.a,w.v,w.a+'/'+w.v,w.a+' / '+w.v];
    for(var vi=0;vi<vpairs.length;vi++){if(norm(s)===norm(vpairs[vi]))return displayVerb(w.a,w.v)}
  }
  var info=verbInfo(s);
  if(info)return displayVerb(info.a,info.v);
  if(w&&w.a&&norm(s)===norm(w.a))return displayArabic(w.a,w.p);
  if(w&&w.p){
    var ps=w.p.split('/').map(function(x){return x.trim()}).filter(Boolean);
    for(var i=0;i<ps.length;i++){if(norm(s)===norm(ps[i]))return displayArabic(w.a,w.p)}
  }
  var matched=wordForArabic(s);
  if(matched)return displayArabicWord(matched);
  return displayArabic(s);
}
function expectedAnswer(q){return (S.answerMode==='puzzle'&&q&&q.puzzleTarget)?q.puzzleTarget:q.answer}
function acceptedAnswers(q){
  var arr=[expectedAnswer(q), q.answer];
  if(q&&q.word&&q.word.v&&isArabicText(q.answer)){
    arr.push(q.word.a);
    arr.push(q.word.v);
    arr.push(q.word.a+'/'+q.word.v);
    arr.push(q.word.a+' / '+q.word.v);
    arr.push(q.word.a+' '+q.word.v);
  }
  if(q&&q.word&&q.word.p&&isArabicText(q.answer)){
    arr.push(q.word.a);
    q.word.p.split('/').forEach(function(p){p=p.trim();if(p){arr.push(p);arr.push(q.word.a+' '+p);arr.push(p+' '+q.word.a)}});
    arr.push(q.word.a+' '+q.word.p);
  }
  var seen={};
  return arr.filter(function(x){x=(x||'').toString().trim();var n=norm(x);if(!x||seen[n])return false;seen[n]=true;return true});
}
function isCorrect(q,chosen){
  var c=norm(chosen);
  return acceptedAnswers(q).some(function(a){return norm(a)===c});
}
function containsPlural(q,chosen){
  if(!(q&&q.word&&q.word.p))return true;
  var c=norm(chosen);
  return q.word.p.split('/').some(function(p){return p.trim()&&c.indexOf(norm(p.trim()))>=0});
}
function containsVerb(q,chosen){
  if(!(q&&q.word&&q.word.v))return true;
  var c=norm(chosen);
  return c.indexOf(norm(q.word.v))>=0 || c.indexOf(norm(q.word.a))>=0 && c.indexOf(norm(q.word.v))>=0;
}

var SEARCH_INDEX=[];
TOMES.forEach(function(t){
  Object.keys(D[t]).forEach(function(ch){
    D[t][ch].forEach(function(w){
      SEARCH_INDEX.push({tome:t,chapter:ch,a:w.a,f:w.f,p:w.p||'',v:w.v||'',word:w,hay:norm(w.a+' '+(w.p||'')+' '+(w.v||'')+' '+w.f+' '+ch+' '+t)})
    })
  })
});
function findWords(q){
  var n=norm(q);
  if(!n)return [];
  var exact=[];var starts=[];var contains=[];
  SEARCH_INDEX.forEach(function(r){
    var na=norm(r.a), nf=norm(r.f), nc=norm(r.chapter);
    if(na===n||nf===n)exact.push(r);
    else if(na.indexOf(n)===0||nf.indexOf(n)===0)starts.push(r);
    else if(r.hay.indexOf(n)>=0||nc.indexOf(n)>=0)contains.push(r);
  });
  return exact.concat(starts,contains).slice(0,12);
}

  var chapters=Object.keys(tomeData);
  var tomeWords=[];
  chapters.forEach(function(c){tomeWords=tomeWords.concat(tomeData[c])});

  var sizeOpts=[5,10,15,20,25,30,'all'];
  var h='<div class="hdr"><div class="hdr-ar">بَيْنَ يَدَيْكَ</div>';
  h+='<div class="hdr-sub">Vocabulaire classé par unités — pluriels cassés & verbes الماضي/المضارع</div>';
  h+='<div class="hdr-badge">'+ALL.length+' mots · '+TOMES.length+' tomes</div></div>';

  // Tome tabs
  h+='<div class="tabs">';
  TOMES.forEach(function(t){
    h+='<button class="tab'+(S.tome===t?' on':'')+'" onclick="setTome(\''+esc(t)+'\')">'+t+'</button>';
  });
  h+='</div>';

  // Direction
  h+='<div class="sb"><div class="sb-t">Direction</div><div class="chips">';
  [{i:'a2f',l:'عربي → Fr'},{i:'f2a',l:'Fr → عربي'},{i:'mixed',l:'🔀 Mixte'}].forEach(function(m){
    h+='<button class="chip'+(S.mode===m.i?' on':'')+'" onclick="setMode(\''+m.i+'\')">'+m.l+'</button>';
  });
  h+='</div></div>';

  // Answer mode
  h+='<div class="sb"><div class="sb-t">Propositions</div><div class="chips">';
  [2,4,6].forEach(function(n){
    h+='<button class="chip'+(S.answerMode==='choice'&&S.nc===n?' on':'')+'" onclick="setNc('+n+')">'+n+' choix</button>';
  });
  h+='<button class="chip'+(S.answerMode==='write'?' on':'')+'" onclick="setAnswerMode(\'write\')">✍️ Écrire</button>';
  h+='<button class="chip'+(S.answerMode==='puzzle'?' on':'')+'" onclick="setAnswerMode(\'puzzle\')">🧩 Puzzle</button>';
  h+='</div><div class="mode-note">Écrire : singulier accepté · Puzzle : singulier ou pluriel</div></div>';

  // Size
  h+='<div class="sb"><div class="sb-t">Questions</div><div class="chips">';
  sizeOpts.forEach(function(n){
    var v=typeof n==='number'?n:"'all'";
    var l=n==='all'?'Tout':n;
    h+='<button class="chip'+(S.qs===n?' on':'')+'" onclick="setQs('+v+')">'+l+'</button>';
  });
  h+='</div></div>';

  // Focus modes
  h+='<div class="sb"><div class="sb-t">Révision ciblée</div><div class="chips">';
  h+='<button class="chip" onclick="startPlurals()">ج Pluriels uniquement</button>';
  h+='<button class="chip" onclick="startVerbs()">فعل Verbes uniquement</button>';
  h+='</div><div class="mode-note">Pour réviser seulement les mots avec pluriel cassé ou les verbes.</div></div>';

  // Chapters
  h+='<div class="grid">';
  // All words button
  h+='<button class="card all" onclick="startAll()"><span class="cnum">🌟</span>';
  h+='<span class="clbl">TOUS les mots</span><span class="cbdg">'+ALL.length+'</span></button>';
  // Tome all
  h+='<button class="card ta" onclick="startTome()"><span class="cnum">📚</span>';
  h+='<span class="clbl">Tout '+S.tome+'</span><span class="cbdg">'+tomeWords.length+'</span></button>';
  // Each chapter
  chapters.forEach(function(ch,i){
    var foundCls=(S.searchHighlight&&S.searchHighlight.tome===S.tome&&S.searchHighlight.chapter===ch)?' found':'';
    h+='<button class="card'+foundCls+'" onclick="startCh(\''+esc(ch)+'\')">';
    h+='<span class="cnum">'+(i+1)+'</span>';
    h+='<span class="clbl">'+ch+chapterBadges(tomeData[ch])+'</span>';
    h+='<span class="cbdg">'+tomeData[ch].length+'</span></button>';
  });
  h+='</div>';

  if(stats.p>0){
    h+='<div class="sv">📊 <b>'+stats.p+'</b> parties · <b>'+stats.w+'</b> sans faute · Meilleur : <b>'+stats.b+'%</b></div>';
  }
  el.innerHTML=h;
}

// ── QUIZ ──
function renderQuiz(el){
  var q=S.questions[S.cur];
  if(!q)return;
  var pct=(S.cur/S.questions.length)*100;
  var cols=S.nc===2?2:S.nc===4?2:3;

  var h='<div class="qt"><button class="qbk" onclick="goHome()">← Retour</button>';
  h+='<span class="qcn">'+(S.cur+1)+' / '+S.questions.length+'</span>';
  h+='<span class="qsc">⭐ '+S.score+'</span></div>';
  h+='<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>';

  if(S.streak>=3&&S.cho===null){
    h+='<div class="streak">🔥 Série de '+S.streak+' !</div>';
  }

  h+='<div class="qcard"><div class="qdir">'+(q.dir==='a2f'?'Traduis en français':'Comment dit-on en arabe ?')+'</div>';
  if(q.dir==='a2f'){
    h+='<div class="qar" dir="rtl">'+displayMaybePlural(q.question,q.word)+'</div>';
  }else{
    h+='<div class="qfr">'+q.question+'</div>';
  }
  h+='</div>';

  if(S.answerMode==='choice'){
    h+='<div class="opts" style="grid-template-columns:repeat('+cols+',1fr)">';
    q.opts.forEach(function(opt,i){
      var cls='ob';
      if(S.cho!==null){
        if(opt===q.answer)cls+=' ok';
        else if(opt===S.cho)cls+=' bad';
        else cls+=' dim';
      }
      var isAr=q.dir==='f2a';
      var tcls=isAr?'ot ar':'ot';
      if(isAr)cls+=' ar-opt';
      h+='<button class="'+cls+'" onclick="pick(\''+esc(opt)+'\')"'+(isAr?' dir="rtl"':'')+'>';
      h+='<span class="ol">'+String.fromCharCode(65+i)+'</span>';
      h+='<span class="'+tcls+'">'+displayMaybePlural(opt,wordForArabic(opt))+'</span></button>';
    });
    h+='</div>';
  }else if(S.answerMode==='write'){
    var ar=isArabicText(q.answer);
    h+='<div class="writebox">';
    h+='<input id="wans" class="winput '+(ar?'ar':'')+'" '+(ar?'dir="rtl"':'')+' autocomplete="off" autocapitalize="off" placeholder="Écris ta réponse ici" onkeydown="if(event.key===\'Enter\')checkWrite()" '+(S.cho!==null?'disabled value="'+htm(S.cho)+'"':'')+'>';
    h+='<div class="whint">Les voyelles arabes ne sont pas obligatoires.</div>';
    if(S.cho===null)h+='<div class="brow"><button class="bp" onclick="checkWrite()">Valider</button></div>';
    h+='</div>';
  }else{
    initPuzzle(q);
    h+='<div class="puzzle">';
    var pzAr=isArabicText(expectedAnswer(q));
    h+='<div class="pz-answer '+(S.puzzlePicked.length?'':'empty')+'" '+(pzAr?'dir="rtl"':'')+'>';
    if(S.puzzlePicked.length){
      if(pzAr){
        h+='<span class="pz-joined ar" dir="rtl">'+htm(puzzleCurrent())+'</span>';
        if(S.cho===null)h+='<button class="letter ar back" onclick="removePuzzleLast()">⌫</button>';
      }else{
        S.puzzlePicked.forEach(function(id,pos){
          var pickedLetter=S.puzzleLetters.filter(function(x){return x.id===id})[0];
          h+='<button class="letter" '+(S.cho!==null?'disabled':'')+' onclick="removePuzzle('+pos+')">'+htm(pickedLetter?pickedLetter.ch:'')+'</button>';
        });
      }
    }else h+='Appuie sur les lettres pour former le mot';
    h+='</div>';
    h+='<div class="pz-letters" '+(isArabicText(expectedAnswer(q))?'dir="rtl"':'')+'>';
    S.puzzleLetters.forEach(function(l){
      var used=S.puzzlePicked.indexOf(l.id)>=0;
      h+='<button class="letter '+(isArabicText(expectedAnswer(q))?'ar':'')+(used?' used':'')+'" '+(S.cho!==null?'disabled':'')+' onclick="addPuzzle('+l.id+')">'+htm(l.ch)+'</button>';
    });
    h+='</div>';
    if(S.cho===null)h+='<div class="pz-actions"><button class="bs" onclick="clearPuzzle()">Effacer</button><button class="bp" onclick="checkPuzzle()">Valider</button></div>';
    h+='</div>';
  }

  if(S.cho!==null){
    var ok=isCorrect(q,S.cho);
    var lbl=S.cur+1>=S.questions.length?'Voir les résultats 🏁':'Suivante →';
    var msg=ok?'✅ Bonne réponse !':'❌ Réponse : '+answerDisplay(q);
    h+='<div class="fb"><div class="fbm">'+msg+'</div>';
    if(ok&&S.answerMode==='write'&&q.word&&q.word.p&&isArabicText(q.answer)&&!containsPlural(q,S.cho)){
      h+='<div class="plural-note">ℹ️ Pluriel : '+displayArabic(q.word.a,q.word.p)+'</div>';
    }
    if(ok&&S.answerMode==='write'&&q.word&&q.word.v&&isArabicText(q.answer)&&norm(S.cho)!==norm(q.word.a+' '+q.word.v)&&norm(S.cho)!==norm(q.word.a+'/'+q.word.v)&&norm(S.cho)!==norm(q.word.a+' / '+q.word.v)){
      h+='<div class="plural-note">ℹ️ Forme complète : '+displayVerb(q.word.a,q.word.v)+'</div>';
    }
    h+='<button class="bp" onclick="nxt()">'+lbl+'</button></div>';
  }
  el.innerHTML=h;
}

// ── RESULT ──
function renderResult(el){
  var total=S.questions.length;
  var pct=Math.round(S.score/total*100);
  var wc=S.ans.filter(function(x){return!x.ok}).length;
  var emoji=pct===100?'🏆':pct>=80?'⭐':pct>=60?'👍':pct>=40?'📖':'💪';
  var com=pct===100?'Parfait ! ماشاء الله':pct>=70?'Très bien ! Continue 👏':'Continue à réviser ! 💪';

  if(!S.saved){
    var stats=loadStats();
    stats.p++;if(wc===0)stats.w++;if(pct>stats.b)stats.b=pct;saveStats(stats);
    S.saved=true;
  }

  var h='<div class="rb"><div class="re">'+emoji+'</div>';
  h+='<div class="rl">Résultat</div><div class="rs">'+S.score+' / '+total+'</div>';
  h+='<div class="rp">'+pct+'%</div><div class="rc">'+com+'</div>';

  h+='<div class="rvl">';
  S.ans.forEach(function(x){
    var c=x.ok?'ok':'bad';
    h+='<div class="rvi '+c+'"><span class="rm '+c+'">'+(x.ok?'✓':'✗')+'</span>';
    h+='<span style="font-weight:700;color:#3e2010;'+(x.dir==='a2f'?'direction:rtl':'')+'">'+displayMaybePlural(x.question,x.word)+'</span>';
    h+='<span style="color:#a07850">→</span><span style="color:#5d3a1a;font-weight:600">'+x.answer+'</span>';
    if(!x.ok)h+='<span style="color:#c62828;font-size:.65rem">(tu: '+x.chosen+')</span>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="brow"><button class="bp" onclick="replay()">🔄 Rejouer</button>';
  if(wc>0)h+='<button class="bp er" onclick="retryErr()">❌ Refaire '+wc+' erreur'+(wc>1?'s':'')+'</button>';
  h+='<button class="bs" onclick="goHome()">🏠 Accueil</button></div></div>';
  el.innerHTML=h;
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════
function setTome(t){S.tome=t;render()}
function setMode(m){S.mode=m;render()}
function setNc(n){S.nc=n;S.answerMode='choice';render()}
function setAnswerMode(m){S.answerMode=m;render()}
function setQs(n){S.qs=n;render()}

function launch(pool,label){
  S.questions=buildQ(pool,S.mode,S.qs,S.nc);
  S.cur=0;S.cho=null;S.score=0;S.streak=0;S.ans=[];
  S.puzzleFor=null;S.puzzleLetters=[];S.puzzlePicked=[];
  S.selCh=label;S.saved=false;S.searchHighlight=null;S.scr='quiz';render();window.scrollTo(0,0);
}

function startCh(ch){
  launch(D[S.tome][ch],ch);
}
function startTome(){
  var pool=[];Object.keys(D[S.tome]).forEach(function(c){pool=pool.concat(D[S.tome][c])});
  launch(pool,S.tome);
}
function startAll(){launch(ALL,'all')}
function startPlurals(){launch(ALL.filter(function(w){return hasPlural(w)}),'plurals')}
function startVerbs(){launch(ALL.filter(function(w){return hasVerb(w)}),'verbs')}

function recordAnswer(chosen){
  if(S.cho!==null)return;
  var q=S.questions[S.cur];
  var ok=isCorrect(q,chosen);
  S.cho=chosen;
  if(ok){S.score++;S.streak++}else{S.streak=0}
  S.ans.push({question:q.question,answer:q.answer,chosen:chosen,ok:ok,dir:q.dir,word:q.word});
  render();
}

function pick(opt){recordAnswer(opt)}

function checkWrite(){
  var inp=$('wans');
  if(!inp)return;
  var v=inp.value.trim();
  if(!v)return;
  recordAnswer(v);
}

function initPuzzle(q){
  if(S.puzzleFor===S.cur)return;
  q.puzzleTarget=q.answer;
  if(isArabicText(q.answer)&&q.word&&q.word.v){
    q.puzzleTarget=(Math.random()>.5)?q.word.v:q.word.a;
  }else if(isArabicText(q.answer)&&q.word&&q.word.p){
    q.puzzleTarget=(Math.random()>.5)?primaryPlural(q.word.p):q.word.a;
  }
  var txt=puzzleTargetText(q.puzzleTarget);
  q.puzzleTarget=txt;
  var chars=splitPuzzleChars(txt);
  var extras=extraPuzzleChars(txt,3);
  var allChars=chars.concat(extras);
  S.puzzleLetters=shuffle(allChars.map(function(ch,i){return{ch:ch,id:i}}));
  S.puzzlePicked=[];
  S.puzzleFor=S.cur;
}
function addPuzzle(id){if(S.cho!==null)return;if(S.puzzlePicked.indexOf(id)<0){S.puzzlePicked.push(id);render()}}
function removePuzzle(pos){if(S.cho!==null)return;S.puzzlePicked.splice(pos,1);render()}
function removePuzzleLast(){if(S.cho!==null)return;S.puzzlePicked.pop();render()}
function clearPuzzle(){if(S.cho!==null)return;S.puzzlePicked=[];render()}
function puzzleCurrent(){
  return S.puzzlePicked.map(function(id){
    for(var i=0;i<S.puzzleLetters.length;i++){if(S.puzzleLetters[i].id===id)return S.puzzleLetters[i].ch}
    return '';
  }).join('');
}
function checkPuzzle(){
  if(!S.puzzlePicked.length)return;
  recordAnswer(puzzleCurrent());
}

function nxt(){
  if(S.cur+1>=S.questions.length)S.scr='result';
  else{S.cur++;S.cho=null;S.puzzleFor=null;S.puzzleLetters=[];S.puzzlePicked=[]}
  render();window.scrollTo(0,0);
}

function replay(){
  var pool=[];
  if(S.selCh==='all')pool=ALL;
  else if(S.selCh==='plurals')pool=ALL.filter(function(w){return hasPlural(w)});
  else if(S.selCh==='verbs')pool=ALL.filter(function(w){return hasVerb(w)});
  else{
    var found=false;
    TOMES.forEach(function(t){if(D[t][S.selCh]){pool=D[t][S.selCh];found=true}});
    if(!found){
      Object.keys(D[S.tome]).forEach(function(c){pool=pool.concat(D[S.tome][c])});
    }
  }
  launch(pool,S.selCh);
}

function retryErr(){
  var wrong=S.ans.filter(function(x){return !x.ok&&x.word}).map(function(x){return x.word});
  if(wrong.length===0)return;
  S.questions=buildQ(wrong,S.mode,'all',S.nc);
  S.cur=0;S.cho=null;S.score=0;S.streak=0;S.ans=[];
  S.puzzleFor=null;S.puzzleLetters=[];S.puzzlePicked=[];S.saved=false;
  S.scr='quiz';render();window.scrollTo(0,0);
}

function goHome(){S.scr='home';render();window.scrollTo(0,0)}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render();
</script>
